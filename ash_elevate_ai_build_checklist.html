  ]},
  {id:"s2",phase:"ph-1",phaseLabel:"Phase 1 — Foundation & architecture",icon:"ti-database",title:"Database design & data models",items:[

  {id:"s3",phase:"ph-2",phaseLabel:"Phase 2 — Core backend modules",icon:"ti-server",title:"Backend API — authentication & security layer",items:[
    {id:"au1",label:"Build JWT-based authentication with refresh tokens for all four portal types",meta:"Access token: 15 min expiry. Refresh token: 7 days, stored HTTP-only cookie",tags:["security","critical"]},

    {id:"ad7",label:"Admin actions (payment record, issue resolution, role changes) must be logged with timestamp",meta:"Audit trail for accountability",tags:["security","high"]},

  ]},

  {id:"s13",phase:"ph-5",phaseLabel:"Phase 5 — Security hardening & launch",icon:"ti-shield-lock",title:"Security hardening — application layer",items:[

let checked=JSON.parse(localStorage.getItem('ash_el')||'{}');
let activeF='all';
function save(){try{localStorage.setItem('ash_el',JSON.stringify(checked));}catch(e){}}
function allItems(){return sections.flatMap(s=>s.items);}

function updateStats(){
  const all=allItems(),total=all.length,done=all.filter(i=>checked[i.id]).length,pct=total?Math.round(done/total*100):0;
  document.getElementById('totalStat').textContent=total;
  document.getElementById('doneStat').textContent=done;
  document.getElementById('remStat').textContent=total-done;
  document.getElementById('pctStat').textContent=pct+'%';
  document.getElementById('progBar').style.width=pct+'%';
}

function filterItems(items){
  if(activeF==='all') return items;
  if(activeF==='remaining') return items.filter(i=>!checked[i.id]);
  if(activeF==='security') return items.filter(i=>i.tags.includes('security'));
  return items;
}

function filterSection(s){
  if(activeF==='all'||activeF==='remaining'||activeF==='security') return filterItems(s.items).length>0;
  return s.phase===activeF;
}

function render(){
  const cont=document.getElementById('sections');
  cont.innerHTML='';
  let lastPhase='';
  sections.forEach(section=>{
    const vis=filterItems(section.items);
    if(!filterSection(section)||!vis.length) return;
    const showPhaseLabel=(activeF==='all'||activeF===section.phase)&&section.phaseLabel!==lastPhase;
    if(showPhaseLabel){lastPhase=section.phaseLabel;const pl=document.createElement('div');pl.className='phase-label';pl.textContent=section.phaseLabel;cont.appendChild(pl);}
    const doneCount=section.items.filter(i=>checked[i.id]).length;
    const allDone=doneCount===section.items.length;
    const div=document.createElement('div');div.className='section';
    const phClass=section.phase;
    div.innerHTML=`
      <div class="sh" onclick="toggleSec(this)">
        <i class="ti ${section.icon} sh-icon" aria-hidden="true"></i>
        <span class="sh-title">${section.title}</span>
        <span class="sh-badge ${allDone?'all-done':''}">${doneCount}/${section.items.length}</span>
        <i class="ti ti-chevron-down chevron open" aria-hidden="true"></i>
      </div>
      <div class="items open">
        ${vis.map(item=>`
          <div class="item ${checked[item.id]?'checked':''}" onclick="toggle('${item.id}')">
            <div class="chk"></div>
            <div class="item-text">
              <div class="item-label">${item.label}${item.tags.filter(t=>['critical','high','medium'].includes(t)).map(t=>`<span class="tag t-${t}">${t}</span>`).join('')}${item.tags.includes('security')?'<span class="tag t-security">security</span>':''}</div>
              ${item.meta?`<div class="item-meta">${item.meta}</div>`:''}
            </div>
          </div>`).join('')}
      </div>`;
    cont.appendChild(div);
  });
  updateStats();
}

function toggleSec(h){const items=h.nextElementSibling,ch=h.querySelector('.chevron');items.classList.toggle('open');ch.classList.toggle('open');}
function toggle(id){checked[id]=!checked[id];save();render();}

document.getElementById('filterRow').addEventListener('click',e=>{
  const btn=e.target.closest('.fb');if(!btn)return;
  activeF=btn.dataset.f;
  document.querySelectorAll('.fb').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');render();
});

document.getElementById('expBtn').addEventListener('click',()=>{
  const all=allItems(),done=all.filter(i=>checked[i.id]),rem=all.filter(i=>!checked[i.id]);
  const txt=`ASH ELEVATE AI — Build & Security Checklist\nExported: ${new Date().toLocaleDateString()}\nProgress: ${done.length}/${all.length}\n\nCompleted:\n${done.map(i=>'✓ '+i.label).join('\n')}\n\nRemaining:\n${rem.map(i=>'○ '+i.label).join('\n')}`;
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([txt],{type:'text/plain'}));a.download='ash-elevate-ai-checklist.txt';a.click();
});

render();
</script>
